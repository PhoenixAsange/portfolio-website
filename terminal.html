    <title>Terminal Mode — Phoenix</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body { background:#111; color:#cfcfcf; font-family: monospace; display:flex; align-items:flex-start; justify-content:center; padding:40px }

    </style>
  </head>
  <body>
    <div class="terminal">
      <div class="line"><span class="prompt">phoenix@portfolio:</span> <span>$</span> Welcome to terminal mode — this is a demo page.</div>

      <div class="line">This page intentionally contains no real terminal functionality.</div>

      <a class="back" href="./index.html">← back to home</a>
    </div>
